<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="shortcut icon" type="image/x-icon" href="./logo.ico">

    <title>Dasein;</title>

    <meta property="og:url" content="https://dasein.qpi.digital/">
    <meta property="og:title" content="Dasein;">
    <meta property="og:type" content="website">
    <meta property="og:logo" content="./logo.ico" />
    <meta property="og:image" content="/OG.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

    <script async src="https://cse.google.com/cse.js?cx=b794e851ac2524ee7"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>

    <link rel="stylesheet" href="style.css?v=1.6">
</head>

<body>
    <div class="paper-grain"></div>
    <div class="fixed-vertical-line"></div>

    <div class="layout-grid">

        <aside class="left-panel">
            <h1 class="main-title">Dasein;</h1>

            <div class="search-container">
                <div class="gcse-searchbox" data-mobileLayout="disabled"></div>
            </div>

            <div id="ai-summary-container" style="display: none;">
                <div class="ai-summary-box">
                    <button id="btn-generate-summary" class="summary-badge" onclick="triggerSummary()">연구 주제 추천</button>
                    <div class="ai-summary-scroll-area">
                        <div id="ai-summary-content"></div>
                    </div>
                </div>
            </div>

            <div class="vhs-footer">
                <div class="vhs-label-bar">
                    <span class="brand-name">Dasein;</span>
                    <span id="ollama-status" style="margin-left:auto; font-size:10px;">2026 쿼터파이</span>
                </div>
                <div class="vhs-stripes">
                    <div class="stripe s-3"></div>
                    <div class="stripe s-2"></div>
                    <div class="stripe s-1"></div>
                </div>
            </div>
        </aside>

        <main class="right-panel">
            <div id="intro-section">
                <h2 class="intro-heading">Being-there.</h2>
                <div class="intro-divider"></div>
                <p class="intro-desc">
                    독일어 <b>Dasein</b>[다자인]은 '거기(Da)에 있음(Sein)'을 의미하며,<br>
                    하이데거 철학에서 다자인은 자신의 존재 이유를 스스로 묻는 탐구자를 의미합니다.
                </p>
            </div>

            <div class="gcse-searchresults" data-mobileLayout="disabled"></div>
        </main>

    </div>

    <script>
        const OLLAMA_CONFIG = {
            endpoint: 'https://ai.qpi.digital/api/chat',
            model: 'gemma4:e2b' //하고싶으면 e4b도 설치되어 있으니까 해도 되는데, e2b로도 충분한데 굳이? 싶긴 함
        };

        marked.setOptions({ breaks: true, gfm: true });
        let currentQuery = '';
        let currentResults = [];
        let currentResultsString = '';

        function triggerSummary() {
            if (currentQuery && currentResults.length > 0) generateSummary(currentQuery, currentResults);
        }

        //thinking 볼 수 있게 하는 코드인데, gemma4에서는 지원 안하는건지 코드 잘못짠건지 모르겠음,,
        function parseWithThinking(text, preserveOpenState = null) {
            let outputHtml = '';
            let parts = text.split(/<(?:think|thinking|thought|reasoning)[^>]*>|<\/(?:think|thinking|thought|reasoning)>/i);

            for (let i = 0; i < parts.length; i++) {
                if (i % 2 === 1) {
                    const isClosed = i < parts.length - 1;
                    const summaryText = isClosed
                        ? 'AI 사고 과정 보기'
                        : '<span class="loading-spinner" style="width: 12px; height: 12px; margin-right: 6px; border-width: 2px;"></span>AI가 생각을 정리하고 있습니다...';

                    let openAttr = '';
                    if (!isClosed) {
                        openAttr = preserveOpenState === false ? '' : 'open';
                    } else {
                        openAttr = preserveOpenState === true ? 'open' : '';
                    }

                    let contentProcess = marked.parse(parts[i]);
                    if (!isClosed) {
                        contentProcess += '<span class="thinking-cursor"></span>';
                    }
                    outputHtml += `<details class="ai-thinking" ${openAttr}><summary>${summaryText}</summary><div class="thinking-content">${contentProcess}</div></details>`;
                } else {
                    if (parts[i].trim()) {
                        outputHtml += marked.parse(parts[i]);
                    }
                }
            }
            return outputHtml;
        }

        //서버 정기 재부팅/점검중일때 공지 띄우기
        async function generateSummary(query, searchResults) {
            const summaryContent = document.getElementById('ai-summary-content');
            const summaryBtn = document.getElementById('btn-generate-summary');
            var d = new Date();
            var utc = d.getTime() + (d.getTimezoneOffset() * 60000);
            var kstDate = new Date(utc + (3600000 * 9));
            var hours = kstDate.getHours();
            var minutes = kstDate.getMinutes();

            if (hours === 0 && minutes >= 0 && minutes < 10) {
                summaryContent.innerHTML = `
                    <div style="padding: 15px; background: rgba(139, 31, 40, 0.05); border-radius: 8px; border: 1px solid rgba(139, 31, 40, 0.2);">
                        <h3 style="color: var(--red-dark); margin-bottom: 8px; font-size: 1.05rem;">서버 점검 중입니다.</h3>
                        <p style="font-size: 0.9rem; color: #555; margin: 0;">매일 24:00 ~ 24:10 (KST) 사이에는 원활한 서비스 제공을 위한 서버 점검이 진행됩니다.<br>점검이 완료된 후 다시 시도해주세요.</p>
                     </div>
                `;
                return;
            }

            summaryBtn.innerText = 'AI 분석 중...';
            summaryBtn.disabled = true;
            summaryContent.innerHTML = `
                <div style="display: flex; align-items: flex-start; gap: 8px;">
                    <div class="loading-spinner" style="margin-top: 4px;"></div>
                    <div style="display: flex; flex-direction: column; gap: 4px;">
                        <p style="margin:0;">Dasein; AI 대기열에 있습니다. 잠시만 기다려주세요. ..</p>
                        <div class="slow-response-container">
                            <div class="slow-response-btn" onclick="this.nextElementSibling.classList.toggle('show')">
                                <svg viewBox="0 0 24 24"><path d="M11 17h2v-6h-2v6zm1-15C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 9h2V7h-2v2z"/></svg>
                                답변이 지연되고 있나요?
                            </div>
                            <div class="slow-response-desc">
                                현재 제한된 단일 GPU 노드에서 심층 추론을 수행하고 있습니다.<br>트래픽에 따른 작업 대기열 상태에 따라 응답 수신까지 다소 시간이 소요될 수 있습니다.
                            </div>
                        </div>
                    </div>
                </div>`;

            try {
                let resultsContext = `검색어: ${query}\n\n`;
                searchResults.forEach((res, i) => {
                    resultsContext += `${i + 1}. ${res.title}\n${res.snippet}\n\n`;
                });

                const systemPrompt = `당신은 뛰어난 학술 연구 조언가입니다. 제공된 검색 결과와 데이터를 바탕으로 다음 두 가지를 작성:
                                        1. 해당 주제의 핵심 개념 및 현재 학술적 동향에 대한 간략한 소개 (2-3문장 내외)
                                        2. 창의적이고 심도 있는 구체적인 [연구 주제 3~5가지] 추천. 검색 결과를 그대로 읊는게 아니라, 검색 결과를 종합해 창의적인 주제를 추천할 것.
                                        thinking 최소화 할 것. 각 연구 주제에는 추천하는 이유와 구체적인 탐구 방향을 간략히 포함. 마크다운 문법을 사용하되, 인사말 없이 본론만 출력.`;

                const response = await fetch(OLLAMA_CONFIG.endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: OLLAMA_CONFIG.model,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: `검색어 "${query}"에 대한 학술 검색 결과들입니다:\n${resultsContext}` }
                        ],
                        stream: true // 한글자 한글자씩 보이게
                    })
                });

                if (!response.ok) throw new Error('Ollama 서버 응답 실패. 터널 상태를 확인하세요.');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';
                let isFirstToken = true;

                summaryContent.innerHTML = `
                    <details class="ai-thinking" open>
                        <summary><span class="loading-spinner" style="width: 12px; height: 12px; margin-right: 6px; border-width: 2px;"></span>답변 생성 중...</summary>
                        <div class="thinking-content">
                            <p style="color: #666; margin: 0;">더 나은 답변을 제공하기 위해 thinking 기능을 사용중입니다.</p>
                            <p style="color: #888; font-size: 0.8rem; margin-top: 4px;">모델이 생각중입니다...<span class="thinking-cursor"></span></p>
                        </div>
                    </details>`;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    // 받아온 바이너리 데이터를 텍스트로 변환
                    const chunk = decoder.decode(value, { stream: true });

                    // Ollama는 여러 JSON 객체를 줄바꿈으로 구분하여 보냅니다.
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (!line.trim()) continue;
                        try {
                            const json = JSON.parse(line);
                            if (json.message && json.message.content) {
                                if (isFirstToken) {
                                    summaryContent.innerHTML = ''; // 첫 토큰 수신 시 UI 클리어
                                    isFirstToken = false;
                                }
                                // 마크다운이 실시간 렌더링되면서 전체 DOM이 덮어씌워질 때 
                                // 사용자가 수동으로 <details>를 열거나 닫은 상태를 보존하기 위해 기존 상태를 기억합니다.
                                const existingThinkingDetails = summaryContent.querySelector('.ai-thinking');
                                let currentOpenState = existingThinkingDetails ? existingThinkingDetails.hasAttribute('open') : null;

                                const previousIsClosed = /<\/(?:think|thought|reasoning)>/i.test(fullText);
                                fullText += json.message.content;
                                const isNowClosed = /<\/(?:think|thought|reasoning)>/i.test(fullText);

                                // 방금 막 생각이 끝난 시점이라면(</think> 태그 추가됨) 깔끔한 UI를 위해 자동으로 닫아줍니다.
                                if (!previousIsClosed && isNowClosed) {
                                    currentOpenState = false;
                                }

                                // 마크다운 실시간 렌더링 (저장된 토글 상태를 매개변수로 넘김)
                                summaryContent.innerHTML = parseWithThinking(fullText, currentOpenState);

                                // 스크롤을 아래로 유지 (선택 사항)
                                const scrollArea = document.querySelector('.ai-summary-scroll-area');
                                if (scrollArea) scrollArea.scrollTop = scrollArea.scrollHeight;
                            }
                            if (json.done) break;
                        } catch (e) {
                            console.error("JSON 파싱 에러:", e);
                        }
                    }
                }

            } catch (error) {
                summaryContent.innerHTML = `<p style="color: #ff6b6b;">오류 발생: ${error.message}</p>`;
            } finally {
                summaryBtn.innerText = '다시 추천받기';
                summaryBtn.disabled = false;
            }
        }

        // 결과 감지 로직
        const resultsObserver = new MutationObserver(() => {
            const results = document.querySelectorAll('.gsc-webResult.gsc-result');
            const searchInput = document.querySelector('input.gsc-input');
            const query = searchInput ? searchInput.value.trim() : '';

            if (results.length > 0 && query) {
                const extractedResults = Array.from(results).map(el => ({
                    title: el.querySelector('.gs-title')?.textContent.trim() || '',
                    snippet: el.querySelector('.gs-snippet')?.textContent.trim() || ''
                })).slice(0, 10);

                if (extractedResults.length > 0 && extractedResults[0].title !== '') {
                    const newResultsString = JSON.stringify(extractedResults);

                    if (query !== currentQuery || newResultsString !== currentResultsString) {
                        currentQuery = query;
                        currentResults = extractedResults;
                        currentResultsString = newResultsString;

                        const introSection = document.getElementById('intro-section');
                        if (introSection) introSection.style.display = 'none';

                        document.getElementById('ai-summary-container').style.display = 'block';
                        document.getElementById('ai-summary-content').innerHTML = '<p style="padding: 10px 0;">위의 버튼을 눌러 연구 주제를 추천받으세요.</p>';

                        const summaryBtn = document.getElementById('btn-generate-summary');
                        summaryBtn.innerText = '연구 주제 추천받기';
                        summaryBtn.disabled = false;
                    }
                }
            }
        });
        resultsObserver.observe(document.body, { childList: true, subtree: true });

        // UI 클리너 (Google Search UI 최적화)
        const uiCleanerObserver = new MutationObserver(() => {
            const junkSelectors = ['.gsc-branding', '.gcsc-branding', '.gsc-watermark', '.gsc-tabsArea', '.gsc-above-wrapper-area', '.gsc-adBlock', '.gsc-orderby-container'];
            junkSelectors.forEach(sel => {
                document.querySelectorAll(sel).forEach(el => {
                    el.style.setProperty('display', 'none', 'important');
                });
            });

            document.querySelectorAll('.gsc-webResult.gsc-result').forEach(card => {
                if (!card.dataset.clickable) {
                    card.dataset.clickable = "true";
                    card.style.cursor = 'pointer';
                    card.addEventListener('click', function (e) {
                        if (window.getSelection().toString().length > 0) return;
                        if (e.target.tagName !== 'A') {
                            const link = this.querySelector('.gs-title a');
                            if (link) link.click();
                        }
                    });
                }
            });
        });
        uiCleanerObserver.observe(document.body, { childList: true, subtree: true });
    </script>
</body>

</html>
